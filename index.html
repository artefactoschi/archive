<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archive — Miguel Limón</title>
<link rel="stylesheet" href="https://use.typekit.net/rdj2lxf.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0a0a0a;
  --white: #f5f4f0;
  --gray-1: #1a1a1a;
  --gray-2: #333;
  --gray-3: #666;
  --gray-4: #999;
  --gray-5: #ccc;
  --gray-6: #e8e6e0;
  --gray-7: #f0ede6;
  --accent: #d1551f;
  --arts: #c94a00;
  --edu: #1a4080;
  --cw: #2a6040;
  --bar-h: 40px;
  --panel-w: 52vw;
  --f-cond: 'futura-pt-condensed', sans-serif;
  --f-body: 'futura-pt', sans-serif;
}

html, body { background: var(--white); color: var(--black); font-family: var(--f-body); font-size: 12px; line-height: 1.4; -webkit-font-smoothing: antialiased; height: 100%; }

/* ── TOPBAR ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--bar-h);
  background: var(--black);
  display: grid;
  grid-template-columns: 200px 1fr auto;
  align-items: stretch;
  border-bottom: 1px solid var(--gray-2);
}
.bar-title {
  font-family: var(--f-cond); font-size: 11px; font-weight: 400;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--white);
  display: flex; align-items: center; padding: 0 16px;
  border-right: 1px solid var(--gray-2);
}
.bar-nav { display: flex; align-items: stretch; }
.bar-tab {
  font-family: var(--f-body); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--gray-4);
  padding: 0 16px; border: none; background: none; cursor: pointer;
  border-right: 1px solid var(--gray-2); transition: color 0.1s, background 0.1s;
  display: flex; align-items: center;
}
.bar-tab:hover { color: var(--white); background: var(--gray-1); }
.bar-tab.active { color: var(--white); }
.bar-tab.active[data-s="Arts"] { border-bottom: 2px solid var(--arts); }
.bar-tab.active[data-s="Education"] { border-bottom: 2px solid var(--edu); }
.bar-tab.active[data-s="Cultural Work"] { border-bottom: 2px solid var(--cw); }
.bar-right { display: flex; align-items: stretch; gap: 0; }
.bar-btn {
  font-family: var(--f-body); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--gray-4);
  padding: 0 14px; border: none; border-left: 1px solid var(--gray-2);
  background: none; cursor: pointer; transition: color 0.1s, background 0.1s;
  display: flex; align-items: center; white-space: nowrap;
}
.bar-btn:hover { color: var(--white); background: var(--gray-1); }
.bar-btn.active { color: var(--white); background: var(--gray-1); }
.bar-btn.accent { color: var(--accent); }
.bar-btn.accent:hover { background: var(--accent); color: var(--white); }
#search-input {
  font-family: var(--f-body); font-size: 10px; letter-spacing: 0.08em;
  background: none; border: none; border-left: 1px solid var(--gray-2);
  color: var(--white); padding: 0 14px; width: 160px; outline: none;
}
#search-input::placeholder { color: var(--gray-4); }

/* ── MAIN ── */
#main { padding-top: var(--bar-h); height: 100vh; display: flex; overflow: hidden; }

/* ── GRID PANEL ── */
#grid-panel { flex: 1; overflow-y: auto; padding: 0; }
#grid-panel::-webkit-scrollbar { width: 3px; }
#grid-panel::-webkit-scrollbar-thumb { background: var(--gray-5); }

/* ── SERIES DIVIDER ── */
.series-divider {
  display: flex; align-items: center;
  padding: 20px 20px 10px;
  gap: 12px;
}
.series-divider-label {
  font-family: var(--f-cond); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gray-4); flex-shrink: 0;
}
.series-divider-line { flex: 1; height: 1px; background: var(--gray-6); }
.series-divider-count { font-size: 10px; color: var(--gray-5); letter-spacing: 0.06em; flex-shrink: 0; }

/* ── PROJECT GRID ── */
.proj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1px;
  background: var(--gray-6);
  margin: 0 20px 20px;
  border: 1px solid var(--gray-6);
}

.proj-card {
  background: var(--white);
  cursor: pointer;
  position: relative;
  transition: background 0.1s;
  display: flex; flex-direction: column;
}
.proj-card:hover { background: var(--gray-7); }
.proj-card.active { background: var(--black); }
.proj-card.selected { background: var(--gray-7); outline: 2px solid var(--black); outline-offset: -2px; }

.proj-card-img {
  width: 100%; aspect-ratio: 3/2;
  background: var(--gray-6); overflow: hidden;
  position: relative;
}
.proj-card-img img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(15%); transition: filter 0.2s; }
.proj-card:hover .proj-card-img img { filter: grayscale(0%); }
.proj-card.active .proj-card-img img { filter: grayscale(100%); }
.proj-card-no-img {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-cond); font-size: 22px; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--gray-5); text-align: center; padding: 12px;
}

/* Selection checkbox */
.proj-check {
  position: absolute; top: 8px; right: 8px; z-index: 2;
  width: 18px; height: 18px; border: 1.5px solid var(--gray-4);
  background: rgba(245,244,240,0.9);
  display: none; align-items: center; justify-content: center;
  cursor: pointer;
}
.select-mode .proj-check { display: flex; }
.proj-card.selected .proj-check { background: var(--black); border-color: var(--black); }
.proj-card.selected .proj-check::after {
  content: ''; width: 4px; height: 7px;
  border: 1.5px solid var(--white); border-top: none; border-left: none;
  transform: rotate(45deg) translate(-1px,-1px); display: block;
}

.proj-card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
.proj-card-series {
  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
}
.proj-card-series[data-s="Arts"] { color: var(--arts); }
.proj-card-series[data-s="Education"] { color: var(--edu); }
.proj-card-series[data-s="Cultural Work"] { color: var(--cw); }
.proj-card.active .proj-card-series { color: var(--gray-4); }

.proj-card-title {
  font-family: var(--f-cond); font-size: 15px; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--black); line-height: 1.1;
}
.proj-card.active .proj-card-title { color: var(--white); }

.proj-card-years { font-size: 10px; color: var(--gray-4); }
.proj-card.active .proj-card-years { color: var(--gray-4); }

.proj-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.proj-tag {
  font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 5px; border: 1px solid var(--gray-5); color: var(--gray-4);
}
.proj-tag.t-work { border-color: var(--gray-4); color: var(--gray-3); }
.proj-tag.t-grant { border-color: #c94a0066; color: var(--arts); }
.proj-tag.t-res { border-color: #1a408066; color: var(--edu); }
.proj-card.active .proj-tag { border-color: var(--gray-2); color: var(--gray-4); }

/* ── LIST VIEW ── */
#list-view { display: none; }
#list-view.vis { display: block; }
#grid-view.hidden { display: none; }

.list-section { margin: 0 20px 24px; }
.list-hd {
  font-family: var(--f-cond); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gray-4);
  padding: 16px 0 6px; border-bottom: 1px solid var(--gray-6);
  display: grid; grid-template-columns: 1fr 90px 70px 80px; gap: 0 12px;
}
.list-row {
  display: grid; grid-template-columns: 1fr 90px 70px 80px; gap: 0 12px;
  padding: 7px 0; border-bottom: 1px solid var(--gray-6);
  cursor: pointer; align-items: baseline; transition: background 0.1s;
}
.list-row:hover { background: var(--gray-7); margin: 0 -8px; padding: 7px 8px; }
.list-row.active { background: var(--black); margin: 0 -8px; padding: 7px 8px; }
.list-title { font-family: var(--f-cond); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
.list-row.active .list-title { color: var(--white); }
.list-meta { font-size: 10px; color: var(--gray-4); }
.list-row.active .list-meta { color: var(--gray-4); }

/* ── DETAIL PANEL ── */
#detail-panel {
  width: 0; flex-shrink: 0; overflow: hidden;
  transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
  border-left: 1px solid var(--gray-6);
  background: var(--white);
  display: flex; flex-direction: column;
}
#detail-panel.open { width: var(--panel-w); }

#detail-top {
  background: var(--black); padding: 20px 28px 20px;
  flex-shrink: 0; position: relative;
}
.d-close {
  position: absolute; top: 14px; right: 16px;
  font-size: 20px; color: var(--gray-3); background: none; border: none; cursor: pointer;
  line-height: 1; padding: 4px; transition: color 0.1s;
}
.d-close:hover { color: var(--white); }
.d-series { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px; }
.d-series[data-s="Arts"] { color: var(--arts); }
.d-series[data-s="Education"] { color: #5580c0; }
.d-series[data-s="Cultural Work"] { color: #5aa080; }
.d-title {
  font-family: var(--f-cond); font-size: 28px; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--white); line-height: 1.0; margin-bottom: 6px;
}
.d-years { font-size: 10px; color: var(--gray-4); margin-bottom: 10px; }
.d-desc { font-size: 11px; color: #888; line-height: 1.7; max-width: 520px; }
.d-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.d-tag { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border: 1px solid; }
.d-tag-grant { border-color: #c94a0055; color: #e07050; }
.d-tag-res { border-color: #1a408055; color: #6090c0; }

#detail-body { flex: 1; overflow-y: auto; }
#detail-body::-webkit-scrollbar { width: 3px; }
#detail-body::-webkit-scrollbar-thumb { background: var(--gray-5); }

/* Detail sections */
.d-section { border-top: 1px solid var(--gray-6); }
.d-section-hd {
  font-family: var(--f-cond); font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--gray-4);
  padding: 12px 28px 8px; display: flex; justify-content: space-between;
}
.d-count { color: var(--gray-5); }

/* Works in detail - grid layout */
.d-works-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--gray-6); margin: 0 28px 16px;
}
.d-work {
  background: var(--white); cursor: pointer;
  transition: background 0.1s; padding: 0;
}
.d-work:hover { background: var(--gray-7); }
.d-work-img { width: 100%; aspect-ratio: 4/3; background: var(--gray-6); overflow: hidden; }
.d-work-img img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); transition: filter 0.15s; }
.d-work:hover .d-work-img img { filter: grayscale(0%); }
.d-work-info { padding: 7px 10px 9px; }
.d-work-title { font-family: var(--f-cond); font-size: 11px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--black); line-height: 1.2; }
.d-work-meta { font-size: 9px; color: var(--gray-4); margin-top: 2px; }

/* List rows in detail */
.d-row {
  display: grid; grid-template-columns: 64px 1fr; gap: 0 16px;
  padding: 8px 28px; border-top: 1px solid var(--gray-6);
  transition: background 0.1s;
}
.d-row:hover { background: var(--gray-7); }
.d-row-yr { font-size: 10px; color: var(--gray-4); padding-top: 1px; }
.d-row-val { font-size: 11px; color: var(--black); line-height: 1.4; }
.d-row-sub { font-size: 10px; color: var(--gray-4); margin-top: 2px; }

/* ── LIGHTBOX ── */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(10,10,10,0.88); align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lb-inner {
  background: var(--white); width: 640px; max-width: 92vw;
  max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column;
}
#lb-header {
  padding: 14px 20px; border-bottom: 1px solid var(--gray-6);
  display: flex; align-items: flex-start; background: var(--black);
}
#lb-close { margin-left: auto; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-4); padding: 0 0 0 12px; }
.lb-title { font-family: var(--f-cond); font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--white); }
.lb-meta { font-size: 10px; color: var(--gray-4); margin-top: 3px; }
#lb-img { width: 100%; max-height: 420px; object-fit: contain; background: var(--gray-7); display: block; }
#lb-body { padding: 16px 20px; }
.lb-row { padding: 6px 0; border-bottom: 1px solid var(--gray-6); display: grid; grid-template-columns: 100px 1fr; gap: 0 12px; }
.lb-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray-4); padding-top: 2px; }
.lb-val { font-size: 11px; color: var(--black); line-height: 1.6; }

/* ── SELECTION BAR ── */
#sel-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--black); border-top: 1px solid var(--gray-2);
  display: none; align-items: center; padding: 0 20px; height: 40px; gap: 16px;
}
#sel-bar.vis { display: flex; }
#sel-count { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-4); flex: 1; }
.sel-action {
  font-family: var(--f-body); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; background: none; border: 1px solid var(--gray-2);
  color: var(--gray-4); padding: 5px 14px; cursor: pointer; transition: all 0.1s;
}
.sel-action:hover { border-color: var(--gray-4); color: var(--white); }
.sel-action.primary { border-color: var(--accent); color: var(--accent); }
.sel-action.primary:hover { background: var(--accent); color: var(--white); }

/* ── PDF PANEL ── */
#pdf-panel {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(10,10,10,0.8); align-items: center; justify-content: center;
}
#pdf-panel.open { display: flex; }
#pdf-inner { background: var(--white); width: 320px; }
#pdf-header {
  background: var(--black); padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.pdf-title { font-family: var(--f-cond); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white); }
#pdf-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--gray-4); padding: 0; }
#pdf-body { padding: 16px; }
.pdf-group-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-4); margin-bottom: 7px; }
.pdf-option { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; font-size: 11px; color: var(--black); cursor: pointer; }
.pdf-option input { accent-color: var(--black); }
.pdf-select {
  width: 100%; padding: 6px 8px; border: 1px solid var(--gray-5);
  background: var(--white); font-family: var(--f-body); font-size: 11px;
  color: var(--black); margin-top: 2px; margin-bottom: 14px; outline: none;
  appearance: none; cursor: pointer;
}
.pdf-submit {
  width: 100%; padding: 9px; background: var(--black); color: var(--white);
  border: none; font-family: var(--f-body); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background 0.1s;
}
.pdf-submit:hover { background: var(--gray-1); }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: var(--black); z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.load-title { font-family: var(--f-cond); font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white); }
.load-track { width: 200px; height: 1px; background: var(--gray-2); }
.load-fill { height: 1px; background: var(--white); width: 0%; transition: width 0.3s; }
.load-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-4); }
</style>
</head>
<body>

<div id="loading">
  <div class="load-title">Miguel Limón — Archive</div>
  <div class="load-track"><div class="load-fill" id="load-fill"></div></div>
  <div class="load-label" id="load-label">Loading</div>
</div>

<div id="topbar">
  <div class="bar-title">Archive / ML</div>
  <div class="bar-nav" id="bar-nav">
    <button class="bar-tab active" data-s="all" onclick="filterSeries('all',this)">All</button>
    <button class="bar-tab" data-s="Arts" onclick="filterSeries('Arts',this)">Arts</button>
    <button class="bar-tab" data-s="Education" onclick="filterSeries('Education',this)">Education</button>
    <button class="bar-tab" data-s="Cultural Work" onclick="filterSeries('Cultural Work',this)">Cultural Work</button>
  </div>
  <div class="bar-right">
    <input id="search-input" type="search" placeholder="Search..." oninput="handleSearch()">
    <button class="bar-btn" id="vbtn-grid" onclick="setView('grid')">Grid</button>
    <button class="bar-btn" id="vbtn-list" onclick="setView('list')">List</button>
    <button class="bar-btn" id="sel-btn" onclick="toggleSelect()">Select</button>
    <button class="bar-btn accent" onclick="openPDF()">PDF ↗</button>
  </div>
</div>

<div id="main">
  <div id="grid-panel">
    <div id="grid-view"></div>
    <div id="list-view"></div>
  </div>
  <div id="detail-panel">
    <div id="detail-top">
      <button class="d-close" onclick="closeDetail()">×</button>
      <div class="d-series" id="d-series"></div>
      <div class="d-title" id="d-title"></div>
      <div class="d-years" id="d-years"></div>
      <div class="d-desc" id="d-desc"></div>
      <div class="d-tags" id="d-tags"></div>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="lb-inner">
    <div id="lb-header">
      <div><div class="lb-title" id="lb-title"></div><div class="lb-meta" id="lb-meta"></div></div>
      <button id="lb-close" onclick="closeLB()">×</button>
    </div>
    <img id="lb-img" src="" alt="" style="display:none">
    <div id="lb-body"></div>
  </div>
</div>

<!-- SELECTION BAR -->
<div id="sel-bar">
  <span id="sel-count">0 selected</span>
  <button class="sel-action" onclick="clearSel()">Clear</button>
  <button class="sel-action primary" onclick="openPDFSel()">Export PDF ↗</button>
</div>

<!-- PDF PANEL -->
<div id="pdf-panel">
  <div id="pdf-inner">
    <div id="pdf-header">
      <span class="pdf-title">Export PDF</span>
      <button id="pdf-close" onclick="closePDF()">×</button>
    </div>
    <div id="pdf-body">
      <div class="pdf-group-label">Source</div>
      <label class="pdf-option"><input type="radio" name="pdf-src" value="all" checked> All works</label>
      <label class="pdf-option"><input type="radio" name="pdf-src" value="project"> Current project (<span id="pdf-proj-name">none</span>)</label>
      <label class="pdf-option" style="margin-bottom:14px"><input type="radio" name="pdf-src" value="selected"> Selected (<span id="pdf-sel-n">0</span>)</label>
      <div class="pdf-group-label">Layout</div>
      <select class="pdf-select" id="pdf-layout">
        <option value="works">Works pages</option>
        <option value="list">Checklist</option>
      </select>
      <button class="pdf-submit" onclick="runPDF()">Generate PDF ↗</button>
    </div>
  </div>
</div>

<script>
const TOKEN = 'patl4FNtwbo43SJcy.04ce63f7c0be9f5c08ba65c6eac8d14a288d9bfabfc1c79282a85a6cf36ade3c';
const BASE  = 'appSu2cur8Ckvrrfa';
const TBL = {
  series:   'tblvc9YOX73uPXAZg',
  projects: 'tblfS8r1tEL3cvyET',
  works:    'tbl0KrbmkmEF4Wlwj',
  programs: 'tblBDj0U9cAqqoMX0',
  exhibits: 'tblFB3ynASe58cPHp',
  press:    'tbl9HY3XjaRXmtqqc',
  talks:    'tblvsxhmzH72MuYfi',
  grants:   'tblO9e5eYALK5Dcku',
};

let db = {};
let activeSeries = 'all';
let activeProject = null;
let searchQ = '';
let view = 'grid';
let selMode = false;
let selIds = new Set();

async function fetchAll(tid) {
  let recs = [], offset;
  do {
    const url = `https://api.airtable.com/v0/${BASE}/${tid}?pageSize=100${offset?'&offset='+offset:''}`;
    const d = await (await fetch(url,{headers:{Authorization:`Bearer ${TOKEN}`}})).json();
    recs = recs.concat(d.records||[]);
    offset = d.offset;
  } while (offset);
  return recs;
}

async function init() {
  const fill = document.getElementById('load-fill');
  const lbl = document.getElementById('load-label');
  const entries = Object.entries(TBL);
  let n = 0;
  await Promise.all(entries.map(async ([k,tid]) => {
    db[k] = await fetchAll(tid);
    n++; fill.style.width = (n/entries.length*100)+'%';
    lbl.textContent = k;
  }));
  document.getElementById('loading').style.display = 'none';
  render();
}

function sName(proj) {
  const sid = (proj.fields['Series']||[])[0];
  if (!sid) return '';
  const s = db.series.find(x => x.id === sid);
  return s ? s.fields['Name']||'' : '';
}

function projImg(p) {
  for (const w of db.works.filter(w => (w.fields['Project']||[]).includes(p.id))) {
    if (w.fields['Images']&&w.fields['Images'].length) return w.fields['Images'][0].thumbnails?.large?.url||w.fields['Images'][0].url;
    if (w.fields['Image URLs']) { const u = w.fields['Image URLs'].split('\n').map(x=>x.trim()).filter(Boolean); if(u.length) return u[0]; }
  }
  return null;
}

function filtered() {
  return db.projects.filter(p => {
    if (activeSeries !== 'all' && sName(p) !== activeSeries) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!(p.fields['Name']||'').toLowerCase().includes(q) && !(p.fields['Description']||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() { renderGrid(); renderList(); }

function renderGrid() {
  const root = document.getElementById('grid-view');
  root.innerHTML = '';
  const projs = filtered();
  if (!projs.length) { root.innerHTML = '<div style="padding:60px 20px;text-align:center;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-4);">No projects found</div>'; return; }

  const order = ['Arts','Education','Cultural Work'];
  const bySeries = {};
  projs.forEach(p => { const s = sName(p)||'Other'; (bySeries[s]=bySeries[s]||[]).push(p); });

  order.filter(s => bySeries[s]).forEach(s => {
    const div = document.createElement('div');

    const hd = document.createElement('div');
    hd.className = 'series-divider';
    const lbl = document.createElement('div'); lbl.className = 'series-divider-label'; lbl.textContent = s; hd.appendChild(lbl);
    const ln = document.createElement('div'); ln.className = 'series-divider-line'; hd.appendChild(ln);
    const cnt = document.createElement('div'); cnt.className = 'series-divider-count'; cnt.textContent = bySeries[s].length + (bySeries[s].length===1?' project':' projects'); hd.appendChild(cnt);
    div.appendChild(hd);

    const grid = document.createElement('div');
    grid.className = 'proj-grid';
    bySeries[s].sort((a,b)=>(a.fields['Name']||'').localeCompare(b.fields['Name']||'')).forEach(p => {
      grid.appendChild(makeCard(p));
    });
    div.appendChild(grid);
    root.appendChild(div);
  });
}

function makeCard(p) {
  const s = sName(p);
  const name = p.fields['Name']||'';
  const img = projImg(p);
  const wc = db.works.filter(w=>(w.fields['Project']||[]).includes(p.id)).length;
  const grants = p.fields['Grant Context']||[];
  const res = p.fields['Residency Context']||[];
  const isActive = activeProject && activeProject.id === p.id;
  const isSel = selIds.has(p.id);

  const card = document.createElement('div');
  card.className = 'proj-card' + (isActive?' active':'') + (isSel?' selected':'');

  // Image
  const imgDiv = document.createElement('div'); imgDiv.className = 'proj-card-img';
  if (img) { const i = document.createElement('img'); i.src=img; i.loading='lazy'; imgDiv.appendChild(i); }
  else { const d = document.createElement('div'); d.className='proj-card-no-img'; d.textContent=name; imgDiv.appendChild(d); }

  // Check
  const chk = document.createElement('div'); chk.className = 'proj-check';
  imgDiv.appendChild(chk);
  card.appendChild(imgDiv);

  // Body
  const body = document.createElement('div'); body.className = 'proj-card-body';
  const se = document.createElement('div'); se.className='proj-card-series'; se.setAttribute('data-s',s); se.textContent=s; body.appendChild(se);
  const ti = document.createElement('div'); ti.className='proj-card-title'; ti.textContent=name; body.appendChild(ti);
  if (p.fields['Years Active']) { const y=document.createElement('div'); y.className='proj-card-years'; y.textContent=p.fields['Years Active']; body.appendChild(y); }
  const tags = document.createElement('div'); tags.className='proj-card-tags';
  if (wc) { const t=document.createElement('span'); t.className='proj-tag t-work'; t.textContent=wc+' work'+(wc!==1?'s':''); tags.appendChild(t); }
  if (grants.length) { const t=document.createElement('span'); t.className='proj-tag t-grant'; t.textContent=grants[0]; tags.appendChild(t); }
  if (res.length) { const t=document.createElement('span'); t.className='proj-tag t-res'; t.textContent=res[0]; tags.appendChild(t); }
  body.appendChild(tags);
  card.appendChild(body);

  card.addEventListener('click', (function(id){ return function(e) {
    if (selMode) { e.stopPropagation(); toggleSelId(id); }
    else openProject(id);
  }; })(p.id));
  return card;
}

function renderList() {
  const root = document.getElementById('list-view');
  root.innerHTML = '';
  const projs = filtered();
  const order = ['Arts','Education','Cultural Work'];
  const bySeries = {};
  projs.forEach(p => { const s=sName(p)||'Other'; (bySeries[s]=bySeries[s]||[]).push(p); });

  order.filter(s=>bySeries[s]).forEach(s => {
    const sec = document.createElement('div'); sec.className='list-section';
    const hd = document.createElement('div'); hd.className='list-hd';
    ['Project','Years','Works','Status'].forEach(t=>{ const d=document.createElement('div'); d.textContent=t; hd.appendChild(d); });
    sec.appendChild(hd);
    bySeries[s].sort((a,b)=>(a.fields['Name']||'').localeCompare(b.fields['Name']||'')).forEach(p=>{
      const wc = db.works.filter(w=>(w.fields['Project']||[]).includes(p.id)).length;
      const isActive = activeProject && activeProject.id===p.id;
      const row = document.createElement('div'); row.className='list-row'+(isActive?' active':'');
      const t=document.createElement('div'); t.className='list-title'; t.textContent=p.fields['Name']||''; row.appendChild(t);
      const y=document.createElement('div'); y.className='list-meta'; y.textContent=p.fields['Years Active']||'—'; row.appendChild(y);
      const w=document.createElement('div'); w.className='list-meta'; w.textContent=wc?wc+' works':'—'; row.appendChild(w);
      const st=document.createElement('div'); st.className='list-meta'; st.textContent=p.fields['Status']||'—'; row.appendChild(st);
      row.addEventListener('click',(function(id){return function(){openProject(id);};})(p.id));
      sec.appendChild(row);
    });
    root.appendChild(sec);
  });
}

function openProject(id) {
  const proj = db.projects.find(p=>p.id===id);
  if (!proj) return;
  activeProject = proj;
  render();

  const f = proj.fields;
  const s = sName(proj);
  document.getElementById('d-series').textContent = s;
  document.getElementById('d-series').setAttribute('data-s', s);
  document.getElementById('d-title').textContent = f['Name']||'';
  document.getElementById('d-years').textContent = f['Years Active']||'';
  document.getElementById('d-desc').textContent = f['Description']||'';

  const tagsEl = document.getElementById('d-tags');
  tagsEl.innerHTML = '';
  (f['Grant Context']||[]).forEach(g=>{ const t=document.createElement('span'); t.className='d-tag d-tag-grant'; t.textContent=g; tagsEl.appendChild(t); });
  (f['Residency Context']||[]).forEach(r=>{ const t=document.createElement('span'); t.className='d-tag d-tag-res'; t.textContent=r; tagsEl.appendChild(t); });

  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  // Works grid
  const works = db.works.filter(w=>(w.fields['Project']||[]).includes(id));
  if (works.length) {
    const sec = document.createElement('div'); sec.className='d-section';
    const hd = document.createElement('div'); hd.className='d-section-hd';
    hd.innerHTML = 'Works <span class="d-count">'+works.length+'</span>';
    sec.appendChild(hd);
    const grid = document.createElement('div'); grid.className='d-works-grid';
    works.sort((a,b)=>(b.fields['Year']||'').localeCompare(a.fields['Year']||'')).forEach(w=>{
      const wf = w.fields;
      let img='';
      if (wf['Images']&&wf['Images'].length) img=wf['Images'][0].thumbnails?.small?.url||wf['Images'][0].url;
      else if (wf['Image URLs']){ const u=wf['Image URLs'].split('\n').map(x=>x.trim()).filter(Boolean); if(u.length)img=u[0]; }
      const card=document.createElement('div'); card.className='d-work';
      const imgD=document.createElement('div'); imgD.className='d-work-img';
      if(img){const i=document.createElement('img');i.src=img;i.loading='lazy';imgD.appendChild(i);}
      const inf=document.createElement('div');inf.className='d-work-info';
      const tt=document.createElement('div');tt.className='d-work-title';tt.textContent=wf['Title']||'';inf.appendChild(tt);
      const mt=document.createElement('div');mt.className='d-work-meta';mt.textContent=[wf['Medium Category'],wf['Year']].filter(Boolean).join(' · ');inf.appendChild(mt);
      card.appendChild(imgD); card.appendChild(inf);
      card.addEventListener('click',(function(wid){return function(){openWork(wid);};})(w.id));
      grid.appendChild(card);
    });
    sec.appendChild(grid); body.appendChild(sec);
  }

  // Programs
  const progs = db.programs.filter(p=>(p.fields['Project']||[]).includes(id));
  if (progs.length) appendRows(body,'Programs',progs.map(p=>({yr:p.fields['Year']||'',val:p.fields['Title']||'',sub:p.fields['Host / Venue']||''})));

  // Exhibitions
  const nm = (f['Name']||'').toLowerCase();
  const exhs = db.exhibits.filter(e=>(e.fields['Related Project']||'').toLowerCase().includes(nm));
  if (exhs.length) appendRows(body,'Exhibitions',exhs.sort((a,b)=>(b.fields['Year']||'').localeCompare(a.fields['Year']||'')).map(e=>({yr:e.fields['Year']||'',val:e.fields['Title']||'',sub:e.fields['Venue']||''})));

  // Press
  const press = db.press.filter(p=>(p.fields['Related Project']||'').toLowerCase().includes(nm));
  if (press.length) appendRows(body,'Press',press.sort((a,b)=>(b.fields['Year']||'').localeCompare(a.fields['Year']||'')).map(p=>({yr:p.fields['Year']||'',val:p.fields['Title']||'',sub:p.fields['Publication']||''})));

  // Talks
  const talks = db.talks.filter(t=>(t.fields['Related Project']||'').toLowerCase().includes(nm));
  if (talks.length) appendRows(body,'Talks',talks.map(t=>({yr:t.fields['Year']||'',val:t.fields['Title']||'',sub:(t.fields['Role']||'')+(t.fields['Host Institution']?' · '+t.fields['Host Institution']:'')})));

  if (!body.children.length) body.innerHTML='<div style="padding:32px 28px;font-size:10px;color:var(--gray-4);letter-spacing:0.1em;text-transform:uppercase;">No linked records</div>';
  document.getElementById('detail-panel').classList.add('open');
}

function appendRows(parent, label, rows) {
  const sec=document.createElement('div'); sec.className='d-section';
  const hd=document.createElement('div'); hd.className='d-section-hd';
  hd.innerHTML=label+' <span class="d-count">'+rows.length+'</span>';
  sec.appendChild(hd);
  rows.forEach(({yr,val,sub})=>{
    const row=document.createElement('div'); row.className='d-row';
    const y=document.createElement('div'); y.className='d-row-yr'; y.textContent=yr; row.appendChild(y);
    const v=document.createElement('div'); v.className='d-row-val'; v.textContent=val;
    if(sub){ const s=document.createElement('div'); s.className='d-row-sub'; s.textContent=sub; v.appendChild(s); }
    row.appendChild(v); sec.appendChild(row);
  });
  parent.appendChild(sec);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  activeProject = null;
  render();
}

function openWork(id) {
  const w = db.works.find(x=>x.id===id);
  if (!w) return;
  const f = w.fields;
  let img='';
  if(f['Images']&&f['Images'].length) img=f['Images'][0].url;
  else if(f['Image URLs']){const u=f['Image URLs'].split('\n').map(x=>x.trim()).filter(Boolean);if(u.length)img=u[0];}
  document.getElementById('lb-title').textContent=f['Title']||'';
  document.getElementById('lb-meta').textContent=[f['Medium'],f['Year'],f['Dimensions']].filter(Boolean).join(' · ');
  const imgEl=document.getElementById('lb-img');
  if(img){imgEl.src=img;imgEl.style.display='block';}else imgEl.style.display='none';
  const body=document.getElementById('lb-body');
  body.innerHTML='';
  [['Medium',f['Medium']],['Year',f['Year']],['Dimensions',f['Dimensions']],['Edition',f['Edition']],['Statement',f['Statement']],['Collection',f['Collection Status']]].filter(([,v])=>v).forEach(([l,v])=>{
    const row=document.createElement('div'); row.className='lb-row';
    const lbl=document.createElement('div'); lbl.className='lb-label'; lbl.textContent=l; row.appendChild(lbl);
    const val=document.createElement('div'); val.className='lb-val'; val.textContent=v; row.appendChild(val);
    body.appendChild(row);
  });
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){ document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))closeLB();});

function filterSeries(s,btn) {
  activeSeries=s;
  document.querySelectorAll('.bar-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(activeProject) closeDetail();
  else render();
}
function handleSearch(){ searchQ=document.getElementById('search-input').value.trim(); render(); }
function setView(v){
  view=v;
  document.getElementById('vbtn-grid').classList.toggle('active',v==='grid');
  document.getElementById('vbtn-list').classList.toggle('active',v==='list');
  document.getElementById('grid-view').classList.toggle('hidden',v!=='grid');
  document.getElementById('list-view').classList.toggle('vis',v==='list');
}

// Selection
function toggleSelect(){
  selMode=!selMode;
  document.getElementById('sel-btn').classList.toggle('active',selMode);
  document.getElementById('grid-panel').classList.toggle('select-mode',selMode);
  if(!selMode){ clearSel(); } else render();
}
function toggleSelId(id){
  if(selIds.has(id)) selIds.delete(id); else selIds.add(id);
  updateSelBar(); render();
}
function clearSel(){ selIds.clear(); updateSelBar(); render(); }
function updateSelBar(){
  const bar=document.getElementById('sel-bar');
  bar.classList.toggle('vis',selIds.size>0);
  document.getElementById('sel-count').textContent=selIds.size+' selected';
}

// PDF
function openPDF(){
  document.getElementById('pdf-proj-name').textContent=activeProject?activeProject.fields['Name']||'none':'none';
  document.getElementById('pdf-sel-n').textContent=selIds.size;
  document.getElementById('pdf-panel').classList.add('open');
}
function openPDFSel(){
  document.querySelector('input[name="pdf-src"][value="selected"]').checked=true;
  openPDF();
}
function closePDF(){ document.getElementById('pdf-panel').classList.remove('open'); }
document.getElementById('pdf-panel').addEventListener('click',e=>{if(e.target===document.getElementById('pdf-panel'))closePDF();});
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeLB();closePDF();} });

function runPDF(){
  const src=document.querySelector('input[name="pdf-src"]:checked').value;
  const layout=document.getElementById('pdf-layout').value;
  let works=[];
  if(src==='all') works=[...db.works];
  else if(src==='project'&&activeProject) works=db.works.filter(w=>(w.fields['Project']||[]).includes(activeProject.id));
  else if(src==='selected') works=db.works.filter(w=>selIds.has(w.id));
  if(!works.length){alert('No works to export.');return;}
  closePDF();

  const container=document.createElement('div');
  if(layout==='list'){
    listPages(works).forEach(pg=>{ const wrap=document.createElement('div');wrap.className='cat-page-wrap';wrap.appendChild(pg);container.appendChild(wrap); });
  } else {
    // Group by project
    const projsSeen=[...new Set(works.flatMap(w=>w.fields['Project']||[]))];
    projsSeen.forEach(pid=>{
      const proj=db.projects.find(p=>p.id===pid);
      const pw=works.filter(w=>(w.fields['Project']||[]).includes(pid));
      if(!pw.length) return;
      if(proj){
        const intro=mkPage('p-intro');
        const sn=sName(proj);
        intro.innerHTML=`<div style="position:absolute;inset:0;padding:8% 9%;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:10%;">
          <div style="font-size:8px;color:#bbb;margin-bottom:0.5em;font-family:'futura-pt',sans-serif;letter-spacing:0.14em;text-transform:uppercase;">${sn} · ${proj.fields['Years Active']||''}</div>
          <div style="font-family:'futura-pt-condensed',sans-serif;font-size:52px;text-transform:uppercase;letter-spacing:0.03em;color:#111;line-height:1.0;margin-bottom:5%;">${proj.fields['Name']||''}</div>
          <div style="font-family:'futura-pt',sans-serif;font-size:8px;line-height:1.9;color:#555;max-width:76%;">${proj.fields['Description']||''}</div>
        </div>`;
        const iw=document.createElement('div');iw.className='cat-page-wrap';iw.appendChild(intro);container.appendChild(iw);
      }
      pw.forEach((w,i)=>{ const pg=workPage(w,i+1,pw.length); const ww=document.createElement('div');ww.className='cat-page-wrap';ww.appendChild(pg);container.appendChild(ww); });
    });
    // Works with no project
    works.filter(w=>!(w.fields['Project']||[]).length).forEach((w,i,a)=>{ const pg=workPage(w,i+1,a.length); const ww=document.createElement('div');ww.className='cat-page-wrap';ww.appendChild(pg);container.appendChild(ww); });
  }

  const win=window.open('','_blank');
  win.document.write(printDoc(container.innerHTML));
  win.document.close();
  setTimeout(()=>win.print(),900);
}

function mkPage(cls){ const d=document.createElement('div'); d.className='cat-page '+cls; return d; }

function workPage(w,n,total){
  const f=w.fields; const pg=mkPage('p-work');
  let img='';
  if(f['Images']&&f['Images'].length) img=f['Images'][0].url;
  else if(f['Image URLs']){const u=f['Image URLs'].split('\n').map(x=>x.trim()).filter(Boolean);if(u.length)img=u[0];}
  const proj=f['Project']&&f['Project'].length?(db.projects.find(p=>p.id===f['Project'][0])||null):null;
  const pName=proj?proj.fields['Name']||'':'';
  const meta=[f['Medium'],f['Dimensions'],f['Edition']].filter(Boolean);
  pg.innerHTML=`<div style="position:absolute;inset:0;padding:5% 7%;display:flex;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3.5%;">
      <div>
        <div style="font-size:7.5px;font-style:italic;color:#111;font-family:'futura-pt',sans-serif;line-height:1.4;">Miguel<br>Limón</div>
        ${pName?`<div style="font-size:6px;color:#bbb;margin-top:3px;font-family:'futura-pt',sans-serif;">${pName}</div>`:''}
      </div>
      <div style="text-align:right;font-family:'futura-pt',sans-serif;font-size:7px;line-height:1.7;color:#666;">
        <span style="font-family:'futura-pt-condensed',sans-serif;color:#111;font-size:9px;display:block;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:1px;">${f['Title']||''}</span>
        ${meta.map(m=>`<div>${m}</div>`).join('')}
        ${f['Year']?`<div>${f['Year']}</div>`:''}
      </div>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;">
      ${img?`<img src="${img}" style="max-width:90%;max-height:90%;object-fit:contain;filter:grayscale(100%);">`:`<div style="width:55%;aspect-ratio:4/3;background:#f0ece5;display:flex;align-items:center;justify-content:center;font-size:7px;color:#ccc;border:0.5px dashed #ddd;">no image</div>`}
    </div>
    ${f['Statement']?`<div style="margin-top:2.5%;font-size:7px;line-height:1.85;color:#666;max-width:74%;">${(f['Statement']||'').substring(0,260)}</div>`:''}
  </div>
  <span class="cat-folio">${n} / ${total}</span>`;
  return pg;
}

function listPages(works){
  const ROWS=36; const pages=[];
  for(let i=0;i<works.length;i+=ROWS){
    const chunk=works.slice(i,i+ROWS);
    const pg=mkPage('p-list');
    const rows=chunk.map(w=>{
      const f=w.fields;
      const proj=f['Project']&&f['Project'].length?(db.projects.find(p=>p.id===f['Project'][0])||null):null;
      return `<div style="display:grid;grid-template-columns:1fr 110px 70px 80px;gap:0 14px;border-bottom:0.5px solid #eee;padding:5px 0;font-size:8px;line-height:1.4;">
        <div>
          <div style="font-family:'futura-pt-condensed',sans-serif;text-transform:uppercase;letter-spacing:0.02em;color:#111;">${f['Title']||''}</div>
          ${proj?`<div style="color:#999;font-size:6.5px;">${proj.fields['Name']||''}</div>`:''}
        </div>
        <div style="color:#666;font-family:'futura-pt',sans-serif;">${f['Medium Category']||''}</div>
        <div style="color:#666;font-family:'futura-pt',sans-serif;">${f['Year']||''}</div>
        <div style="color:#666;font-family:'futura-pt',sans-serif;">${f['Collection Status']||''}</div>
      </div>`;
    }).join('');
    pg.innerHTML=`<div style="position:absolute;inset:0;padding:6% 8%;">
      <div style="display:grid;grid-template-columns:1fr 110px 70px 80px;gap:0 14px;border-bottom:0.5px solid #ccc;padding-bottom:6px;margin-bottom:2px;font-family:'futura-pt-condensed',sans-serif;font-size:8px;text-transform:uppercase;letter-spacing:0.12em;color:#999;">
        <span>Title</span><span>Medium</span><span>Year</span><span>Status</span>
      </div>${rows}
    </div>
    <span class="cat-folio">${i+1}–${Math.min(i+ROWS,works.length)} of ${works.length}</span>`;
    pages.push(pg);
  }
  return pages;
}

function printDoc(body){
  return `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Miguel Limón — Archive</title>
  <link rel="stylesheet" href="https://use.typekit.net/rdj2lxf.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#fff;}
    @page{size:8.5in 11in;margin:0;}
    .cat-page{width:8.5in;height:11in;background:#fff;position:relative;overflow:hidden;page-break-after:always;break-after:page;}
    .cat-folio{position:absolute;bottom:4%;right:7%;font-size:7px;color:#bbb;letter-spacing:0.06em;font-family:'futura-pt',sans-serif;}
  </style></head><body>${body}</body></html>`;
}

init();
</script>
</body>
</html>
